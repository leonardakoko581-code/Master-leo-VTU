<!DOCTYPE html>
<html>
<head<link rel="manifest" href="manifest.json">>

<title>Master Leo VTU</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#0f172a;
margin:0;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.balance{
font-size:24px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#38bdf8;
border:none;
border-radius:5px;
font-size:16px;
color:black;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

.menu{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.menu button{
width:30%;
}

</style>

</head>

<body>

<header>
Master Leo VTU
</header>

<div class="container">

<div class="card">

<h3>Wallet Balance</h3>

<div class="balance">
₦ <span id="balance">1000</span>
</div>

</div>

<div class="card">

<h3>Buy Airtime</h3>

<select id="network">
<option>MTN</option>
<option>Airtel</option>
<option>Glo</option>
<option>9mobile</option>
</select>

<input type="text" id="phone" placeholder="Enter phone number">

<input type="number" id="amount" placeholder="Enter amount">

<button onclick="buyAirtime()">Buy Airtime</button>

</div>

<div class="menu">

<button>Buy Data</button>
<button>Fund Wallet</button>
<button>History</button>

</div>

</div>

<script>

let wallet = 1000;

function buyAirtime(){

let network=document.getElementById("network").value;
let phone=document.getElementById("phone").value;
let amount=parseInt(document.getElementById("amount").value);

if(phone=="" || amount==""){
alert("Fill all fields");
return;
}

if(amount>wallet){
alert("Insufficient balance");
return;
}

wallet = wallet - amount;

document.getElementById("balance").innerText = wallet;

alert("Airtime sent\nNetwork: "+network+"\nPhone: "+phone+"\nAmount: ₦"+amount);

document.getElementById("phone").value="";
document.getElementById("amount").value="";

}

</script>

</body>
</html>
